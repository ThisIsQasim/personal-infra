---
apiVersion: v1
kind: Service
metadata:
  name: frigate
  labels:
    app: frigate
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 5000
    protocol: TCP
    targetPort: http
  - name: auth
    port: 8971
    protocol: TCP
    targetPort: auth
  selector:
    app: frigate
---
apiVersion: v1
kind: Service
metadata:
  name: frigate-webrtc
  labels:
    app: frigate
  annotations:
    kube-vip.io/loadbalancerIPs: y.y.y.y
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  ports:
  - name: webrtc-tcp
    port: 8555
    protocol: TCP
    targetPort: webrtc-tcp
  - name: webrtc-udp
    port: 8555
    protocol: UDP
    targetPort: webrtc-udp
  selector:
    app: frigate
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frigate
  labels:
    app: frigate
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: frigate
  template:
    metadata:
      labels:
        app: frigate
    spec:
      initContainers:
      - name: copy-config
        image: "ghcr.io/blakeblackshear/frigate:0.17.1"
        imagePullPolicy: IfNotPresent
        command:
        - /bin/bash
        - -c
        - |
          cp /tmp/config.yml /config/config.yml
          curl -o /config/yolov9-s-relu6-best_320_int8_edgetpu.tflite -L https://github.com/dbro/frigate-detector-edgetpu-yolo9/releases/download/v1.0/yolov9-s-relu6-best_320_int8_edgetpu.tflite
          curl -o /config/labels-coco17.txt -L https://raw.githubusercontent.com/dbro/frigate-detector-edgetpu-yolo9/refs/heads/main/labels-coco17.txt
        volumeMounts:
        - name: config
          mountPath: /tmp/config.yml
          subPath: config.yml
        - name: media
          mountPath: /config
          subPath: config
      containers:
      - name: frigate
        image: "ghcr.io/blakeblackshear/frigate:0.17.1"
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 5000
          protocol: TCP
        - name: webrtc-tcp
          containerPort: 8555
          protocol: TCP
        - name: webrtc-udp
          containerPort: 8555
          protocol: UDP
        - name: auth
          containerPort: 8971
          protocol: TCP
        startupProbe:
          failureThreshold: 20
          httpGet:
            path: /api/version
            port: http
            scheme: HTTP
        livenessProbe:
          httpGet:
            path: /api/version
            port: http
            scheme: HTTP
        readinessProbe:
          httpGet:
            path: /api/version
            port: http
            scheme: HTTP
        env:
        - name: LIBVA_DRIVER_NAME
          value: i965
        envFrom:
        - secretRef:
            name: frigate
        volumeMounts:
        - name: media
          mountPath: /config
          subPath: config
        - name: media
          mountPath: /media/frigate
        - name: recordings
          mountPath: /media/frigate/recordings
        - name: clips
          mountPath: /media/frigate/clips
        - name: exports
          mountPath: /media/frigate/exports
        - name: dshm
          mountPath: /dev/shm
        - name: dshm
          mountPath: /tmp/cache
          subPath: tmp
        resources:
          requests:
            cpu: "1.5"
            memory: "7Gi"
            smarter-devices/dri_card0: 1
            smarter-devices/dri_renderD128: 1
            smarter-devices/apex_0: 1
          limits:
            memory: "10Gi"
            smarter-devices/dri_card0: 1
            smarter-devices/dri_renderD128: 1
            smarter-devices/apex_0: 1
        securityContext:
          capabilities:
            add: ["SYS_ADMIN", "CAP_PERFMON"]
      volumes:
      - name: config
        configMap:
          name: frigate
      - name: media
        hostPath:
          path: /home/ha/frigate
          type: Directory
      - name: recordings
        hostPath:
          path: /mnt/external/backups/recordings
          type: Directory
      - name: clips
        hostPath:
          path: /mnt/external/backups/clips
          type: Directory
      - name: exports
        hostPath:
          path: /mnt/external/backups/exports
          type: Directory
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 1.5Gi
      nodeSelector:
        kubernetes.io/hostname: node2
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frigate
  labels:
    app: frigate
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/auth-url: http://authentik-server.authentik.svc.cluster.local/outpost.goauthentik.io/auth/nginx
    nginx.ingress.kubernetes.io/auth-signin: https://authentik.home.com/outpost.goauthentik.io/start?rd=https://$host$escaped_request_uri
    nginx.ingress.kubernetes.io/auth-response-headers: Set-Cookie,X-authentik-username,X-authentik-groups,X-authentik-email,X-authentik-name,X-authentik-uid,X-frigate-role
    nginx.ingress.kubernetes.io/auth-snippet: |
        proxy_set_header X-Forwarded-Host $http_host;
    nginx.ingress.kubernetes.io/auth-cache-key: $cookie_authentik_proxy_EhWySFtO
    nginx.ingress.kubernetes.io/auth-cache-duration: 200 202 10m, 401 5s
    gethomepage.dev/description: NVR
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Home Automation
    gethomepage.dev/icon: frigate-light.png
    gethomepage.dev/name: Frigate
    gethomepage.dev/pod-selector: app=frigate
    gethomepage.dev/weight: "0"
    gethomepage.dev/widget.type: frigate
    gethomepage.dev/widget.url: http://frigate.ha.svc:5000
    gethomepage.dev/widget.enableRecentEvents: "true"
spec:
  tls:
  - hosts:
    - frigate.home.com
  rules:
  - host: frigate.home.com
    http:
      paths:
      - path: /
        pathType: "ImplementationSpecific"
        backend:
          service:
            name: frigate
            port:
              name: auth
