---
apiVersion: v1
kind: Service
metadata:
  name: ups-proxy
spec:
  clusterIP: None
  ports:
  - name: http
    port: 80
    protocol: TCP
---
kind: Endpoints
apiVersion: v1
metadata:
  name: ups-proxy
subsets:
  - addresses:
      - ip: y.y.y.y
    ports:
      - port: 80
        name: http
        protocol: TCP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ups-proxy
  labels:
    app: ups-proxy
  annotations:
    gethomepage.dev/description: APC Smart-UPS 1500
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Utilities
    gethomepage.dev/icon: ups.png
    gethomepage.dev/name: UPS
    gethomepage.dev/pod-selector: ""
    gethomepage.dev/weight: "40"
    gethomepage.dev/widget.type: apcups
    gethomepage.dev/widget.url: tcp://apcupsd.utilities.svc:3551
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: gateway
    namespace: istio-ingress
    sectionName: https
  hostnames:
  - ups.home.com
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    filters:
    - type: RequestHeaderModifier
      requestHeaderModifier:
        set:
        - name: X-Forwarded-Host
          value: ups.home.com
    backendRefs:
    - name: ups-proxy
      port: 80
