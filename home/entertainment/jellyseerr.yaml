---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyseerr
  labels:
    app: jellyseerr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jellyseerr
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: jellyseerr
    spec:
      containers:
      - image: fallenbagel/jellyseerr:2.7.3
        imagePullPolicy: IfNotPresent
        name: jellyseerr
        env:
        - name: TZ
          value: "Asia/Karachi"
        volumeMounts:
        - mountPath: /app/config
          name: config
        ports:
        - containerPort: 5055
        livenessProbe:
          tcpSocket:
            port: 5055
          initialDelaySeconds: 600
          periodSeconds: 5
        readinessProbe:
          tcpSocket:
            port: 5055
          initialDelaySeconds: 15
          periodSeconds: 5
        resources:
          requests:
            cpu: "100m"
          limits:
            memory: "512Mi"
      volumes:
        - name: config
          hostPath:
            path: /home/entertainment/jellyseerr
            type: DirectoryOrCreate
      nodeSelector:
        kubernetes.io/hostname: node3
---
apiVersion: v1
kind: Service
metadata:
  name: jellyseerr
  labels:
    app: jellyseerr
spec:
  ports:
  - port: 5055
    protocol: TCP
    targetPort: 5055
  selector:
    app: jellyseerr
  type: ClusterIP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: jellyseerr
  labels:
    app: jellyseerr
  annotations:
    gethomepage.dev/description: Media Requests
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Entertainment
    gethomepage.dev/icon: jellyseerr.png
    gethomepage.dev/name: Jellyseerr
    gethomepage.dev/pod-selector: app=jellyseerr
    gethomepage.dev/weight: "94"
    gethomepage.dev/widget.type: seerr
    gethomepage.dev/widget.url: http://jellyseerr.entertainment.svc:5055
    gethomepage.dev/widget.key: "{{HOMEPAGE_VAR_JELLYSEERR_KEY}}"
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: gateway
    namespace: istio-ingress
    sectionName: https
  hostnames:
  - jellyseerr.home.com
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: jellyseerr
      port: 5055
