---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: metube
rules:
- apiGroups: [""] # "" indicates the core API group
  resources: ["secrets"]
  # Create can not be restricted to a resource name.
  verbs: ["create"]
- apiGroups: [""] # "" indicates the core API group
  resources: ["events"]
  verbs: ["get", "create", "patch"]
- apiGroups: [""] # "" indicates the core API group
  resourceNames: ["metube-tailscale-state"]
  resources: ["secrets"]
  verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: metube
subjects:
- kind: ServiceAccount
  name: "metube"
roleRef:
  kind: Role
  name: metube
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: metube
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metube
  labels:
    app: metube
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metube
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: metube
    spec:
      serviceAccount: metube
      containers:
      - image: ghcr.io/tailscale/tailscale:v1.98.9
        imagePullPolicy: IfNotPresent
        name: tailscale
        env:
        - name: TS_HOSTNAME
          value: "metube"
        - name: TS_EXTRA_ARGS
          value: "--login-server https://headscale.home.com:443"
        - name: TS_KUBE_SECRET
          value: "metube-tailscale-state"
        - name: TS_USERSPACE
          value: "true"
        - name: TS_AUTHKEY
          valueFrom:
            secretKeyRef:
              name: metube
              key: TS_AUTHKEY
              optional: true
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_UID
          valueFrom:
            fieldRef:
              fieldPath: metadata.uid
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
        resources:
          requests:
            cpu: "50m"
          limits:
            memory: "128Mi"
      - image: ghcr.io/alexta69/metube:2026.07.10
        imagePullPolicy: IfNotPresent
        name: metube
        env:
        - name: UID
          value: "1001"
        - name: GID
          value: "1001"
        - name: YTDL_OPTIONS
          value: '{"proxy": "socks5://byedpi.utilities.svc:1080/", "concurrent_fragment_downloads": 1, "sleep_interval_requests": 5, "throttledratelimit": 400000, "nopart": true, "verbose": true}'
        volumeMounts:
        - mountPath: /downloads
          name: downloads
        ports:
        - containerPort: 8081
        livenessProbe:
          tcpSocket:
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 5
        readinessProbe:
          tcpSocket:
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 5
        resources:
          requests:
            cpu: "100m"
            memory: "512Mi"
          limits:
            memory: "1Gi"
        securityContext:
          runAsUser: 1001
          runAsGroup: 1001
      volumes:
        - name: downloads
          hostPath:
            path: /mnt/external/Downloads/ytdl
            type: Directory
        - name: wireguard
          secret:
            secretName: wireguard
      nodeSelector:
        kubernetes.io/hostname: node3
---
apiVersion: v1
kind: Service
metadata:
  name: metube
  labels:
    app: metube
spec:
  ports:
  - port: 8081
    protocol: TCP
    targetPort: 8081
  selector:
    app: metube
  type: ClusterIP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: metube
  labels:
    app: metube
  annotations:
    gethomepage.dev/description: YouTube Downloader
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Entertainment
    gethomepage.dev/icon: metube.png
    gethomepage.dev/name: Metube
    gethomepage.dev/pod-selector: app=metube
    gethomepage.dev/weight: "40"
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: gateway
    namespace: istio-ingress
    sectionName: https
  hostnames:
  - ytdl.home.com
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: metube
      port: 8081
