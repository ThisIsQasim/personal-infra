---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: transmission
  labels:
    app: transmission
spec:
  replicas: 1
  selector:
    matchLabels:
      app: transmission
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: transmission
    spec:
      securityContext:
        runAsUser: 1001
        runAsGroup: 1001
      containers:
      - image: ghcr.io/thisisqasim/transmission:0.0.15
        imagePullPolicy: IfNotPresent
        name: transmission
        env:
        - name: TRANSMISSION_DOWNLOAD_QUEUE
          value: "20"
        - name: TRANSMISSION_DOWNLOAD_LIMIT
          value: "51200"
        - name: TRANSMISSION_UPLOAD_LIMIT
          value: "51200"
        - name: TRANSMISSION_ALT_DOWNLOAD_LIMIT
          value: "10240"
        - name: TRANSMISSION_ALT_UPLOAD_LIMIT
          value: "10240"
        - name: TRANSMISSION_DHT_ENABLED
          value: "false"
        - name: TRANSMISSION_PEX_ENABLED
          value: "false"
        - name: TRANSMISSION_AUTH
          value: "false"
        volumeMounts:
        - mountPath: /downloads
          name: downloads
        - mountPath: /etc/transmission-daemon/torrents
          name: torrents
        - mountPath: /etc/transmission-daemon/resume
          name: resume
        ports:
        - containerPort: 9091
        livenessProbe:
          tcpSocket:
            port: 9091
          initialDelaySeconds: 30
          periodSeconds: 5
        readinessProbe:
          tcpSocket:
            port: 9091
          initialDelaySeconds: 15
          periodSeconds: 5
        resources:
          requests:
            cpu: "250m"
          limits:
            memory: "1536Mi"
      volumes:
        - name: downloads
          hostPath:
            path: /mnt/external/Downloads
            type: Directory
        - name: torrents
          hostPath:
            path: /mnt/external/Torrents/torrent.
            type: Directory
        - name: resume
          hostPath:
            path: /mnt/external/Torrents/transmission
            type: Directory
      nodeSelector:
        kubernetes.io/hostname: node3
---
apiVersion: v1
kind: Service
metadata:
  name: transmission
  labels:
    app: transmission
spec:
  ports:
  - port: 9091
    protocol: TCP
    targetPort: 9091
  selector:
    app: transmission
  type: ClusterIP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: transmission
  labels:
    app: transmission
  annotations:
    gethomepage.dev/description: Torrent downloader
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Entertainment
    gethomepage.dev/icon: transmission.png
    gethomepage.dev/name: Transmission
    gethomepage.dev/pod-selector: app=transmission
    gethomepage.dev/weight: "10"
    gethomepage.dev/widget.type: transmission
    gethomepage.dev/widget.url: http://transmission.entertainment.svc:9091
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: gateway
    namespace: istio-ingress
    sectionName: https
  hostnames:
  - torrent.home.com
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: transmission
      port: 9091
